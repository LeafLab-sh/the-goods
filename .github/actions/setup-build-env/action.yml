name: Setup build environment
description: JDK 25 and Gradle — the common setup both CI workflows need before running Gradle tasks. Checkout is
  NOT included here: GitHub Actions resolves a local action reference (uses: ./path) by reading this file off the
  job's workspace, which is empty until checkout has already run — so checkout must stay a separate step in each
  calling workflow, before this action is referenced, not inside it.

runs:
  using: composite
  steps:
    - name: Setup JDK 25
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
