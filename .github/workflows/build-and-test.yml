name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        # Pinned to a commit SHA (not the mutable v6 tag) — this workflow runs on pull_request, including from
        # external forks, so a compromised tag update on a third-party action is a real supply-chain risk here.
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew runGameTestServer
