name: Build

# All actions below are pinned to a commit SHA rather than a mutable version tag — the norm for every workflow in
# this repo, not just this one. This workflow runs on pull_request, including from external forks, so a
# compromised tag update on any of these (first- or third-party) would otherwise run in CI for free.
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew runGameTestServer
